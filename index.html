<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #3a3a3a;
            --glow: rgba(0, 0, 0, 0.04);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: var(--text);
        }

        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            animation: breathe 9s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes breathe {
            0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
        }

        .container {
            position: relative;
            text-align: center;
            z-index: 1;
            animation: appear 3.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes appear {
            from { opacity: 0; filter: blur(8px); transform: scale(0.98); }
            to   { opacity: 1; filter: blur(0);   transform: scale(1); }
        }

        img {
            display: block;
            width: clamp(180px, 30vmin, 300px);
            height: auto;
            filter: grayscale(100%) brightness(1.08);
            opacity: 0.82;
            cursor: crosshair;
            transition: filter 1.4s ease, opacity 1.4s ease, transform 1.4s ease;
        }

        img:hover {
            filter: grayscale(0%) brightness(1.0);
            opacity: 1;
            transform: scale(1.025);
        }

        .hint {
            margin-top: 22px;
            font-size: 0.62rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s ease;
            user-select: none;
        }

        .container:hover .hint {
            opacity: 0.35;
        }

        .hint::after {
            content: '_';
            animation: blink 1.1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        ::selection {
            background: #e4e4e4;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <img
            src="https://img.itch.zone/aW1nLzEyMzA3NzE0LnBuZw==/original/5X94Ed.png"
            alt="Bombycilla cedrorum"
            draggable="false"
        />
        <p class="hint">Bombycilla cedrorum</p>
    </div>

    <script>
        setInterval(() => {
            if (Math.random() > 0.96) {
                document.body.style.opacity = '0.88';
                setTimeout(() => {
                    document.body.style.opacity = '1';
                }, 60);
            }
        }, 1200);

        const img = document.querySelector('img');
        img.addEventListener('click', () => {
            img.style.transition = 'filter 0.08s ease, opacity 0.08s ease';
            img.style.filter = 'grayscale(0%) brightness(1.12)';
            img.style.opacity = '1';
            setTimeout(() => {
                img.style.transition = 'filter 1.4s ease, opacity 1.4s ease, transform 1.4s ease';
                img.style.filter = 'grayscale(100%) brightness(1.08)';
                img.style.opacity = '0.82';
            }, 120);
        });
    </script>

</body>
</html>
